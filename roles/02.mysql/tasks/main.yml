- name: Install MySQL Server
  ansible.builtin.dnf:
    name: mysql-community-server
    state: present

- name: Start MySQL
  ansible.builtin.systemd:
    name: mysqld
    state: restarted

- name: Set Root Password
  ansible.builtin.shell: mysql_secure_installation --set-root-pass {{ lookup('aws_ssm', 'expense.pass_url', region='us-east-1' ) }}