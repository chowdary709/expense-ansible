- name: Set Hostname
  ansible.builtin.shell: set-hostname mysql

- name: Copy MySQL Repo
  ansible.builtin.template:
    src: mysql.repo
    dest: /etc/yum.repos.d/mysql.repo

# Cross check
- name: Disable MySQL 8 Version
  ansible.builtin.shell: dnf module disable mysql -y

