
- name: Set Hostname
  ansible.builtin.shell: set-hostname frontend

- name: Installing Nginx
  ansible.builtin.dnf:
    name: nginx
    state: present



#- name: Include App Pre-requisites
#  ansible.builtin.import_role:
#    name: common
#    tasks_from: app_prereq

- name: Cleanup $component old content
  ansible.builtin.file:
    path: "{{ app_loc }}"
    state: absent


- name: Create app $component directory
  ansible.builtin.file:
    path: "{{ app_loc }}"
    state: directory

- name: Download $component Code and Extract it
  ansible.builtin.unarchive:
    src: https://expense-artifacts.s3.amazonaws.com/$component.zip
    dest: "{{ app_loc }}"
    remote_src: yes


- name: Placing Expense Config File in Nginx
  ansible.builtin.template:
    src: expense.conf
    dest: /etc/nginx/default.d/expense.conf

- name: Update Nginx Config
  ansible.builtin.template:
    src: nginx.conf
    dest: /etc/nginx/nginx.conf

- name: Starting Nginx Service
  ansible.builtin.systemd:
    name: nginx
    state: restarted
    enabled: yes
