- name: Set Hostname
  ansible.builtin.shell: set-hostname frontend

- name: Install Nginx
  ansible.builtin.yum:
    name: nginx
    state: installed

- name: Removing Old Web Content
  ansible.builtin.file:
    path: /usr/share/nginx/html
    state: absent

- name: Create application directory
  ansible.builtin.file:
    path: /usr/share/nginx/html
    state: directory

- name: Downloading Application Content
  ansible.builtin.unarchive:
    src: https://expense-artifacts.s3.amazonaws.com/frontend.zip
    dest: /usr/share/nginx/html
    remote_src: yes

- name: Copy Nginx Service Config file
  ansible.builtin.template:
    src: nginx.conf
    dest: /etc/nginx/nginx.conf
  notify: Restart Nginx Service

- name: Copy RoboShop Nginx Config file
  ansible.builtin.template:
    src: expense.conf
    dest: /etc/nginx/default.d/roboshop.conf
  notify: Restart Nginx Service

- name: Update Nginx Config
  ansible.builtin.template:
    src: nginx.conf
    dest: /etc/nginx/nginx.conf
