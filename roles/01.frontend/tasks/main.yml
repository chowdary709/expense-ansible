- name: Set Hostname
  ansible.builtin.shell: set-hostname frontend

- name: Installing Nginx
  ansible.builtin.dnf:
    name: nginx
    state: present

- name: Placing Expense Config File in Nginx
  ansible.builtin.template:
    src: expense.conf
    dest: /etc/nginx/default.d/expense.conf

- name: Update Nginx Config
  ansible.builtin.template:
    src: nginx.conf
    dest: /etc/nginx/nginx.conf

#- name: Include App Pre-requisites
#  ansible.builtin.import_role:
#    name: common
#    tasks_from: app_prereq.yml

#app_loc: /usr/share/nginx/html
#component: frontend

- name: Cleanup frontend old content
  ansible.builtin.file:
    path: /etc/nginx/nginx.conf
    state: absent


- name: Create app frontend directory
  ansible.builtin.file:
    path: /etc/nginx/nginx.conf
    state: directory

- name: Download frontend Code and Extract it
  ansible.builtin.unarchive:
    src: https://expense-artifacts.s3.amazonaws.com/frontend.zip
    dest: /etc/nginx/nginx.conf
    remote_src: yes

